apiVersion: v1
kind: Secret
metadata:
  name: sample-python-db-credentials
  labels:
    app.kubernetes.io/name: sample-python
    app.kubernetes.io/component: database-credentials
  annotations:
    kubernetes.io/description: "Example-only database credentials for the sample Python app. Replace with sealed/external secrets in production."
type: Opaque
immutable: true
stringData:
  db-port: "CHANGE_ME_PORT"
  db-username: "CHANGE_ME_USERNAME"
  db-password: "CHANGE_ME_PASSWORD"
