apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-python
  labels:
    app.kubernetes.io/name: sample-python
    app.kubernetes.io/component: web
spec:
  replicas: 3
  revisionHistoryLimit: 3
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: sample-python
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sample-python
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sample-python
          image: abhishekf5/python-sample-app-demo:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: db-credentials
              mountPath: /opt/secrets
              readOnly: true
      volumes:
        - name: db-credentials
          secret:
            secretName: sample-python-db-credentials
            defaultMode: 0400
